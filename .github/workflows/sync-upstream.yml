name: Sync Upstream

on:
  schedule:
    # 每天 UTC 时间 0:00 运行 (北京时间 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整的 git 历史以便正确同步

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add Upstream Remote
        run: |
          # 添加上游仓库 (请根据实际情况修改)
          git remote add upstream https://github.com/chatfire-AI/huobao-drama.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Sync with Upstream
        run: |
          # 获取当前分支名
          CURRENT_BRANCH=$(git branch --show-current)

          # 如果是 main 分支，尝试从 upstream main 同步
          # 可以根据需要修改分支名称
          if [ "$CURRENT_BRANCH" = "main" ] || [ "$CURRENT_BRANCH" = "master" ]; then
            echo "Syncing $CURRENT_BRANCH branch..."
            git merge upstream/$CURRENT_BRANCH --no-edit
          else
            echo "Current branch: $CURRENT_BRANCH"
            echo "Syncing from upstream/master..."
            git merge upstream/master --no-edit
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD@{1} HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push Changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}